<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Exam Paper - FuturProctor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-dark: #4338CA;
            --surface: #FFFFFF;
            --background: #F9FAFB;
            --border: #E5E7EB;
            --text: #111827;
            --text-muted: #6B7280;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 24px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }
        
        h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 15px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text);
            font-size: 14px;
        }
        
        input[type="text"], input[type="number"], input[type="datetime-local"], textarea, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .btn {
            padding: 14px 28px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.3);
        }
        
        .btn-cancel {
            background: var(--text-muted);
            margin-left: 12px;
        }
        
        .btn-cancel:hover {
            background: #4B5563;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }
        
        .back-btn {
            display: inline-block;
            margin-bottom: 24px;
            padding: 10px 20px;
            background: rgba(79, 70, 229, 0.1);
            color: var(--primary);
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
        }
        
        .back-btn:hover {
            background: rgba(79, 70, 229, 0.2);
        }
        
        @media (max-width: 768px) {
            body { padding: 16px; }
            .container { padding: 24px; }
            .button-group { flex-direction: column; }
            .btn-cancel { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="{% url 'exam_paper_list' %}" class="back-btn">← Back to Exams</a>
        <h1>➕ Create New Exam Paper</h1>
        <p class="subtitle">Fill in the exam details below</p>

        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="title">Exam Title *</label>
                <input type="text" id="title" name="title" required placeholder="e.g., Midterm Exam - Spring 2024">
            </div>

            <div class="form-group">
                <label for="subject">Subject *</label>
                <input type="text" id="subject" name="subject" required placeholder="e.g., Computer Science, Mathematics">
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" placeholder="Brief description of the exam"></textarea>
            </div>

            <div class="form-group">
                <label for="exam_date">Exam Date & Time *</label>
                <input type="datetime-local" id="exam_date" name="exam_date" required>
            </div>

            <div class="form-group">
                <label for="duration_minutes">Duration (minutes) *</label>
                <input type="number" id="duration_minutes" name="duration_minutes" required min="1" value="60">
            </div>

            <div class="form-group">
                <label for="total_marks">Total Marks *</label>
                <input type="number" id="total_marks" name="total_marks" required min="0" value="100">
            </div>

            <div class="form-group">
                <label for="passing_marks">Passing Marks *</label>
                <input type="number" id="passing_marks" name="passing_marks" required min="0" value="40">
            </div>

            <div class="form-group">
                <label for="instructions">Exam Instructions</label>
                <textarea id="instructions" name="instructions" placeholder="Instructions for students taking this exam"></textarea>
            </div>

            <div class="button-group">
                <button type="submit" class="btn">✓ Create Exam</button>
                <a href="{% url 'exam_paper_list' %}" class="btn btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
