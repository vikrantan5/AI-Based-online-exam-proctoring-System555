<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FuturProctor Admin{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-dark: #4338CA;
            --secondary: #6366F1;
            --background: #F9FAFB;
            --surface: #FFFFFF;
            --border: #E5E7EB;
            --text: #111827;
            --text-muted: #6B7280;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --info: #3B82F6;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
            line-height: 1.6;
        }
        
        .container-fluid {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(0, 0, 0, 0.05);
        }
        
        h1 {
            color: var(--primary);
            margin-bottom: 24px;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 24px;
            transition: all 0.3s ease;
            overflow: hidden;
        }
        
        .card:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            transform: translateY(-2px);
        }
        
        .card-body {
            padding: 28px;
        }
        
        .card-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 20px;
            letter-spacing: -0.3px;
        }
        
        .btn {
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-right: 12px;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }
        
        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-success {
            background: var(--success);
        }
        
        .btn-success:hover {
            background: #059669;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }
        
        .btn-secondary {
            background: var(--text-muted);
        }
        
        .btn-secondary:hover {
            background: #4B5563;
            box-shadow: 0 4px 12px rgba(107, 114, 128, 0.3);
        }
        
        .badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            display: inline-block;
        }
        
        .badge-success {
            background: #D1FAE5;
            color: #065F46;
        }
        
        .badge-danger {
            background: #FEE2E2;
            color: #991B1B;
        }
        
        .badge-warning {
            background: #FEF3C7;
            color: #92400E;
        }
        
        .badge-info {
            background: #DBEAFE;
            color: #1E40AF;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .mt-4 {
            margin-top: 28px;
        }
        
        p {
            margin-bottom: 12px;
            line-height: 1.7;
            color: var(--text-muted);
        }
        
        strong {
            font-weight: 600;
            color: var(--text);
        }
        
        .alert {
            padding: 16px 20px;
            border-radius: 10px;
            margin-bottom: 24px;
            border-left: 4px solid;
            font-size: 14px;
        }
        
        .alert-success {
            background: #D1FAE5;
            border-color: var(--success);
            color: #065F46;
        }
        
        .alert-danger {
            background: #FEE2E2;
            border-color: var(--danger);
            color: #991B1B;
        }
        
        .alert-warning {
            background: #FEF3C7;
            border-color: var(--warning);
            color: #92400E;
        }
        
        .alert-info {
            background: #DBEAFE;
            border-color: var(--info);
            color: #1E40AF;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }
            
            .container-fluid {
                padding: 24px;
                border-radius: 16px;
            }
            
            h1 {
                font-size: 26px;
            }
        }
    </style>
    {% block extra_style %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
    {% block extra_script %}{% endblock %}
</body>
</html>
