<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Question - FuturProctor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-dark: #4338CA;
            --surface: #FFFFFF;
            --background: #F9FAFB;
            --border: #E5E7EB;
            --text: #111827;
            --text-muted: #6B7280;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 24px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }
        
        h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 15px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text);
            font-size: 14px;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .btn {
            padding: 14px 28px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s ease;
        }
        
        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.3);
        }
        
        .btn-cancel {
            background: var(--text-muted);
            margin-left: 12px;
        }
        
        .btn-cancel:hover {
            background: #4B5563;
        }
        
        .mcq-options, .subjective-options {
            display: none;
            padding: 20px;
            background: var(--background);
            border-radius: 12px;
            margin-top: 20px;
        }
        
        @media (max-width: 768px) {
            body { padding: 16px; }
            .container { padding: 24px; }
        }
    </style>
    <script>
        function toggleQuestionType() {
            const type = document.getElementById('question_type').value;
            const mcqOptions = document.querySelector('.mcq-options');
            const subjectiveOptions = document.querySelector('.subjective-options');
            
            if (type === 'mcq') {
                mcqOptions.style.display = 'block';
                subjectiveOptions.style.display = 'none';
            } else {
                mcqOptions.style.display = 'none';
                subjectiveOptions.style.display = 'block';
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <h1>➕ Add New Question</h1>
        <p class="subtitle">Add question to {{ exam_paper.title }}</p>

        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Question Type *</label>
                <select id="question_type" name="question_type" onchange="toggleQuestionType()" required>
                    <option value="mcq">Multiple Choice Question (MCQ)</option>
                    <option value="subjective">Subjective Question</option>
                </select>
            </div>

            <div class="form-group">
                <label>Question Text *</label>
                <textarea name="question_text" required placeholder="Enter the question"></textarea>
            </div>

            <div class="form-group">
                <label>Marks *</label>
                <input type="number" name="marks" value="1" min="1" required>
            </div>

            <div class="form-group">
                <label>Order/Sequence *</label>
                <input type="number" name="order" value="{{ next_order }}" min="1" required>
            </div>

            <!-- MCQ Options -->
            <div class="mcq-options">
                <h3 style="margin-bottom: 16px; font-size: 18px; color: var(--text);">MCQ Options</h3>
                <div class="form-group">
                    <label>Option A *</label>
                    <input type="text" name="option_a" placeholder="Enter option A">
                </div>
                <div class="form-group">
                    <label>Option B *</label>
                    <input type="text" name="option_b" placeholder="Enter option B">
                </div>
                <div class="form-group">
                    <label>Option C *</label>
                    <input type="text" name="option_c" placeholder="Enter option C">
                </div>
                <div class="form-group">
                    <label>Option D *</label>
                    <input type="text" name="option_d" placeholder="Enter option D">
                </div>
                <div class="form-group">
                    <label>Correct Answer *</label>
                    <select name="correct_answer">
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                        <option value="D">D</option>
                    </select>
                </div>
            </div>

            <!-- Subjective Options -->
            <div class="subjective-options">
                <h3 style="margin-bottom: 16px; font-size: 18px; color: var(--text);">Subjective Answer</h3>
                <div class="form-group">
                    <label>Model Answer *</label>
                    <textarea name="model_answer" placeholder="Enter the model/expected answer for AI evaluation" rows="6"></textarea>
                </div>
            </div>

            <div style="margin-top: 32px;">
                <button type="submit" class="btn">✓ Add Question</button>
                <a href="{% url 'exam_paper_detail' exam_paper.id %}" class="btn btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
    <script>
        toggleQuestionType();
    </script>
</body>
</html>
